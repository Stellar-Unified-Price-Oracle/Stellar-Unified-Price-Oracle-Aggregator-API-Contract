name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --manifest-path contracts/price-oracle/Cargo.toml -- --check

      - name: Build
        run: cargo build --manifest-path contracts/price-oracle/Cargo.toml --verbose

      - name: Run clippy
        run: cargo clippy --manifest-path contracts/price-oracle/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path contracts/price-oracle/Cargo.toml --verbose
